<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My AR Scene</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs>
      <a-marker preset="hiro">
        <a-gltf-model
          <!-- Spin continuously -->
          <a-gltf-model src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Assets/Models/Duck/glTF-Binary/Duck.glb"
            animation="property: rotation;
                       to: 0 360 0;
                       loop: false;
                       dur: 3000;
                       easing: linear">
            position="50 0 50"
            rotation="-90 0 0"
            scale="0.3 0.3 0.3">
          </a-gltf-model>
          <!-- Float up and down -->
          <a-gltf-model src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Assets/Models/Duck/glTF-Binary/Duck.glb"
            animation="property: position;
                       to: 0 0.3 0;
                       dir: alternate;
                       loop: true;
                       dur: 1500">
            position="0 0 0"
            rotation="-90 0 0"
            scale="0.5 0.5 0.5">
          </a-gltf-model>
      </a-marker>
      <a-entity camera
                text="value: Hello World;"
                >
      </a-entity>
    </a-scene>
    
  </body>
</html>
